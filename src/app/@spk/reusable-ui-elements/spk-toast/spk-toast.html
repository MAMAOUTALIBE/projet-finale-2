@if (show()) {
@if (content1()) {
<ngb-toast [class]="buttonClass()" [autohide]="autohide()" role="alert" aria-live="assertive" aria-atomic="true"
  (hidden)="onHide()">
  <div class="d-flex">
    {{ content1() }}
    <button class="btn-close {{ btnClass() }} me-2 m-auto" aria-label="Close" (click)="onClose()"></button>
  </div>
  <ng-content></ng-content>
</ngb-toast>
} @else {
<ngb-toast [delay]="5000" [autohide]="autohide()" [header]="header()" [ngClass]="buttonClass()" (hidden)="onHide()">
  <ng-template ngbToastHeader>
    @if (toastImage()) {
    <img class="bd-placeholder-img rounded me-2" src="./assets/images/brand-logos/toggle-dark.png" alt="Your Image" />
    } @else {
    <img class="bd-placeholder-img rounded me-2" src="./assets/images/brand-logos/favicon.ico" alt="Your Image" />
    }
    <strong class="me-auto">nowa</strong>
    <small>11 mins ago</small>
  </ng-template>
  {{ content() }}
  <ng-content></ng-content>
</ngb-toast>
}
}
