
    <div class="card">
        <div class="card-body">
            <div class="card-widget">
                <h6 class="mb-2">{{data()?.title}}</h6>
                <h2 class="text-end">
                    <i class="{{data()?.icon}} icon-size float-start {{data()?.iconColor}} {{data()?.shadowColor}}"></i>
                    <span>{{data()?.value}}</span>
                </h2>
                <p class="mb-0">
                    {{data()?.subtitle}}
                    <span class="float-end">{{data()?.footerValue}}</span>
                </p>
            </div>
        </div>
    </div>
