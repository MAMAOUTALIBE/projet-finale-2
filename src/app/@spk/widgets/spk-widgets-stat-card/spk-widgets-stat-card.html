<div class="card card-img-holder">
    <div class="card-body list-icons">
        <div class="clearfix">
            <div class="float-end mt-2">
                <span class="text-primary">
                    <i class="{{data()?.icon}} fs-30"></i>
                </span>
            </div>
            <div class="float-start text-end">
                <p class="card-text text-muted mb-1">{{data()?.title}}</p>
                <h3 class="text-start">{{data()?.value}}</h3>
            </div>
        </div>
        <div class="card-footer p-0">
            <p class="text-muted mb-0 pt-4">
                <i class="{{data()?.footerIcon}} {{data()?.footerColor}} mx-2"></i>
                {{data()?.footerText}}
            </p>
        </div>
    </div>
</div>
