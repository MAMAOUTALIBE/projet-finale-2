
<div class="card {{data()?.gradient}}">
    <div class="card-body">
        <div class="row">
            <div class="col-6">
                <div class="icon1 mt-2 text-center text-fixed-white">
                    <i class="{{data()?.icon}} fs-40"></i>
                </div>
            </div>
            <div class="col-6">
                <div class="mt-0 text-center text-fixed-white">
                    <span>{{data()?.title}}</span>
                    <h2 class="mb-0 text-fixed-white">{{data()?.value}}</h2>
                </div>
            </div>
        </div>
    </div>
</div>
