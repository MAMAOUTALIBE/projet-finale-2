<div class="card item-card">
  <div class="card-body pb-0 h-100 product-grid6">
    <div class="text-center product-image">
      <img [src]="data()?.image" [alt]="data()?.title" class="img-fluid">
    </div>
    <div class="card-body cardbody position-relative">
      <div class="cardtitle">
        <span class="fs-12 mb-2 fw-bold text-uppercase">{{ data()?.category }}</span>
        <a class="h6 fw-bold text-uppercase d-block">{{ data()?.title }}</a>
      </div>
      <div class="cardprice">
        <span class="type--strikethrough">{{ data()?.oldPrice }}</span>
        <strong>{{ data()?.newPrice }}</strong>
      </div>
    </div>
  </div>
  <div class="text-center border-top pt-3 pb-3 ps-2 pe-2">
    <a href="javascript:void(0);" class="btn btn-primary mb-0 mb-lg-2 me-1">View More</a>
    <a [routerLink]="['/pages/ecommerce/cart']" class="btn btn-secondary mb-0 mb-lg-2 me-1">
      <i class="fa fa-shopping-cart"></i> Add to cart
    </a>
  </div>
</div>
