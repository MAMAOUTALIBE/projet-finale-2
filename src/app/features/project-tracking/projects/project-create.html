<div class="row row-sm">
  <div class="col-lg-12">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h3 class="card-title mb-0">Nouveau projet structurant</h3>
      </div>
      <div class="card-body">
        @if (submitError) {
          <div class="alert alert-danger" role="alert">{{ submitError }}</div>
        }

        <form [formGroup]="form" (ngSubmit)="save()">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Code projet</label>
              <input type="text" class="form-control" formControlName="code" />
            </div>

            <div class="col-md-8">
              <label class="form-label">Nom du projet</label>
              <input type="text" class="form-control" formControlName="name" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Sponsor</label>
              <input type="text" class="form-control" formControlName="sponsor" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Organisation pilote</label>
              <input type="text" class="form-control" formControlName="ownerOrganization" />
            </div>

            <div class="col-md-4">
              <label class="form-label">Date debut</label>
              <input type="date" class="form-control" formControlName="startDate" />
            </div>

            <div class="col-md-4">
              <label class="form-label">Date fin</label>
              <input type="date" class="form-control" formControlName="endDate" />
            </div>

            <div class="col-md-4">
              <label class="form-label">Budget</label>
              <input type="number" class="form-control" formControlName="budget" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Statut initial</label>
              <select class="form-select" formControlName="status">
                @for (status of statusOptions; track status.value) {
                  <option [value]="status.value">{{ status.label }}</option>
                }
              </select>
            </div>

            <div class="col-md-12">
              <label class="form-label">Description</label>
              <textarea rows="4" class="form-control" formControlName="description"></textarea>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-4">
            <a class="btn btn-light" routerLink="/project-tracking/projects">Annuler</a>
            <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
              {{ isSubmitting ? 'Enregistrement...' : 'Enregistrer' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
