<!-- row opened -->
<div class="row row-sm">
  <!-- Col -->
  <div class="col-lg-4 col-xl-3 col-md-12 col-sm-12">
    <div class="card mg-b-20">
      <div class="main-content-left main-content-left-mail card-body">
        <a class="btn btn-primary btn-compose" href="javascript:void(0);" id="btnCompose">Compose</a>
        <div class="main-mail-menu">
          <nav class="nav main-nav-column mg-b-20">
            <a class="nav-link thumb active" href="javascript:void(0);"><i class="far fa-envelope"></i> Inbox
              <span>18</span></a>
            <a class="nav-link thumb" href="javascript:void(0);"><i class="far fa-star"></i> Starred <span>8</span></a>
            <a class="nav-link thumb" href="javascript:void(0);"><i class="far fa-clock"></i> Snoozed <span>6</span></a>
            <a class="nav-link thumb" href="javascript:void(0);"><i class="far fa-bookmark"></i> Important
              <span>15</span></a>
            <a class="nav-link thumb" href="javascript:void(0);"><i class="far fa-paper-plane"></i> Sent Mail
              <span>24</span></a>
            <a class="nav-link thumb" href="javascript:void(0);"><i class="far fa-hourglass"></i> Drafts
              <span>2</span></a>
            <a class="nav-link thumb" href="javascript:void(0);"><i class="far fa-dot-circle"></i> Spam
              <span>32</span></a>
            <a class="nav-link thumb" href="javascript:void(0);"><i class="far fa-comments"></i> Chats
              <span>14</span></a>
            <a class="nav-link thumb" href="javascript:void(0);"><i class="far fa-user-circle"></i> Contacts
              <span>547</span></a>
            <a class="nav-link thumb" href="javascript:void(0);"><i class="fe fe-trash"></i> Trash <span>365</span></a>
          </nav>
          <label class="main-content-label main-content-label-sm">Settings</label>
          <nav class="nav main-nav-column">
            <a class="nav-link active" href="javascript:void(0);">Email Settings</a>
          </nav>
        </div><!-- main-mail-menu -->
      </div>
    </div>
  </div>
  <!-- /Col -->
  <div class="col-xl-9 col-lg-8 col-md-12 col-sm-12">
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Compose new message</h3>
      </div>
      <div class="card-body">
        <form>
          <div class="form-group">
            <div class="row align-items-center">
              <label class="col-sm-2">To</label>
              <div class="col-sm-10">
                <input type="text" class="form-control">
              </div>
            </div>
          </div>
          <div class="form-group">
            <div class="row align-items-center">
              <label class="col-sm-2">Subject</label>
              <div class="col-sm-10">
                <input type="text" class="form-control">
              </div>
            </div>
          </div>
          <div class="form-group">
            <div class="row ">
              <label class="col-sm-2">Message</label>
              <div class="col-sm-10">
                <textarea rows="10" class="form-control"></textarea>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="main-chat-footer d-sm-flex">
        <nav class="nav gap-2">
          <a class="nav-link" href="javascript:void(0);"><i class="bx bx-paperclip text-muted fs-18"
              ngbTooltip="Attach"></i></a>
          <a class="nav-link" href="javascript:void(0);"><i class="bx bx-link text-muted fs-18"
              ngbTooltip="Link"></i></a>
          <a class="nav-link" href="javascript:void(0);"><i class="bx bx-image text-muted fs-18"
              ngbTooltip="Photos"></i></a>
          <a class="nav-link" href="javascript:void(0);"><i class="bx bx-trash text-muted fs-18"
              ngbTooltip="Delete"></i></a>
        </nav>
        <div class="btn-list ms-auto">
          <a class="main-msg-send bg-primary text-fixed-white" href="javascript:void(0);">
            <i class="far fa-paper-plane"></i>
          </a>

          <spk-dropdowns [Customclass]="'d-inline-block custom-dropdown-icon-color '" [class]="'br-5  border no-caret p-2 m-0'" [Icon]="true"
            [IconClass]="'fe fe-more-vertical align-middle '" [Menuclass]="'dropdown-menu tx-13'" [Arrowicon]="false">

            <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Schedule send</a></li>
            <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Mark As Important</a></li>
            <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Discard</a></li>
            <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Settings</a></li>
            <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Help and feedback</a></li>

          </spk-dropdowns>
        </div>

      </div>
    </div>
  </div>
</div>
<!-- row closed -->
