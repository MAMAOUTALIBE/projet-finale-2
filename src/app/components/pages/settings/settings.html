<!-- row -->
<div class="row">
  <div class="col-lg-4 col-xl-3">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Settings</div>
      </div>
      <div class="main-content-left main-content-left-mail card-body">
        <div class="main-settings-menu">
          <nav class="nav main-nav-column">
            <a class="nav-link thumb active mb-2" href="javascript:void(0);"><i class="fe fe-home"></i> Main </a>
            <a class="nav-link thumb mb-2" href="javascript:void(0);"><i class="fe fe-grid"></i> Web Apps</a>
            <a class="nav-link thumb mb-2" href="javascript:void(0);"><i class="fe fe-server"></i> General</a>
            <a class="nav-link thumb mb-2" href="javascript:void(0);"><i class="fe fe-globe"></i> Components</a>
            <a class="nav-link thumb mb-2" href="javascript:void(0);"><i class="fe fe-layers"></i> Pages</a>
            <a class="nav-link thumb mb-2" href="javascript:void(0);"><i class="fe fe-flag"></i> Language & Region</a>
            <a class="nav-link thumb mb-2" href="javascript:void(0);"><i class="fe fe-bell"></i> Notifications</a>
          </nav>
        </div>
      </div>
    </div>
  </div>
  <div class="col-lg-8 col-xl-9">
    <div class="card custom-card">
      <div class="card-header d-block">
        <div class="card-title">Overview</div>
        <p>Used to customize and manage all settngs about this Dashboard</p>
      </div>
    </div>
    <div class="row">
      @for (item of items; track $index) {
      <div class="col-lg-12 col-xl-6 col-md-12 col-sm-12 p-2">
        <div class="card">
          <div class="card-body">
            <div class="row">
              <div class="col-lg-12">
                <div class="d-flex">
                  <div class="settings-main-icon me-4 mt-1">
                    <i [class]="'fe ' + item.icon"></i>
                  </div>
                  <div>
                    <p class="fs-20 fw-semibold d-flex mb-0">{{ item.title }}</p>
                    <p class="fs-13 text-muted mb-0">{{ item.description }}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="card-footer p-3 d-flex align-items-center">
            <a href="javascript:void(0);" class="fs-14 mb-0">Go to Settings</a>

            <label class="custom-switch ms-auto mb-0 d-flex align-items-center">
              <a href="javascript:void(0);" class="fs-14 mb-0 me-2">Restore default</a>
              <span class="form-check form-check-md form-switch mb-0">
                <input class="form-check-input" type="checkbox" role="switch" [id]="'switch-' + $index"
                  [checked]="item.defaultEnabled" />
              </span>
            </label>
          </div>
        </div>
      </div>
      }
     
    </div>
  </div>
</div>
<!--/ row -->
