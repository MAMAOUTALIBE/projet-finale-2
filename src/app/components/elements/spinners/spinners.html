<!-- Start:: row-1 -->
<div class="row">
  <div class="col-xl-6">
      <app-showcode-card [title]="'Border spinner'" [prism]="prismCodeData.Borderspinner"
          >
          <div class="spinner-border" role="status">
              <span class="visually-hidden">Loading...</span>
          </div>
      </app-showcode-card>
  </div>
  <div class="col-xl-6">
      <app-showcode-card [title]="'Growing spinner'" [prism]="prismCodeData.Growingspinner"
          >
          <div class="spinner-grow" role="status">
              <span class="visually-hidden">Loading...</span>
          </div>
      </app-showcode-card>
  </div>
</div>
<!-- End:: row-1 -->

<!-- Start:: row-2 -->
<div class="row">
  <div class="col-xl-6">
      <app-showcode-card [title]="'Colors'" [prism]="prismCodeData.Colors"
          >
          @for (color of colors; track $index) {
          <div class="spinner-border m-1" [ngClass]="'text-' + color" role="status">
              <span class="visually-hidden">Loading...</span>
          </div>
          }

      </app-showcode-card>
  </div>
  <div class="col-xl-6">
      <app-showcode-card [title]="'Growing spinner Colors'" [prism]="prismCodeData.GrowingSpinnerColors"
          >
          @for (color of colors; track $index) {
          <div class="spinner-grow me-1" [ngClass]="'text-' + color" role="status">
              <span class="visually-hidden">Loading...</span>
          </div>
          }
      </app-showcode-card>
  </div>
</div>

<!-- End:: row-2 -->

<!-- Start:: row-3 -->
<div class="row">
  <div class="col-xl-6">
      <app-showcode-card [title]="'Alignment Flex'" [prism]="prismCodeData.AlignmentFlex"
          >
          <div class="d-flex justify-content-center mb-4">
              <div class="spinner-border" role="status">
                  <span class="visually-hidden">Loading...</span>
              </div>
          </div>
          <div class="d-flex align-items-center">
              <strong>Loading...</strong>
              <div class="spinner-border ms-auto" role="status" aria-hidden="true"></div>
          </div>
      </app-showcode-card>
  </div>
  <div class="col-xl-6">
      <app-showcode-card [title]="'Alignment Float'" [prism]="prismCodeData.AlignmentFloat"
          >
          <div class="clearfix mb-4">
              <div class="spinner-border float-end" role="status">
                  <span class="visually-hidden">Loading...</span>
              </div>
          </div>
          <div class="clearfix">
              <div class="spinner-border float-start" role="status">
                  <span class="visually-hidden">Loading...</span>
              </div>
          </div>
      </app-showcode-card>
  </div>
</div>
<!-- End:: row-3 -->

<!-- Start:: row-4 -->
<div class="row">
  <div class="col-xl-6">
      <app-showcode-card [title]="'Alignment Text center'" [prism]="prismCodeData.AlignmentTextcenter"
          >
          <div class="text-center">
              <div class="spinner-border" role="status">
                  <span class="visually-hidden">Loading...</span>
              </div>
          </div>
      </app-showcode-card>
      <app-showcode-card [title]="'Spinner Sizes'" [prism]="prismCodeData.SpinnerSizes"
          >
          <div class="spinner-border spinner-border-sm me-4" role="status">
              <span class="visually-hidden">Loading...</span>
          </div>
          <div class="spinner-grow spinner-grow-sm me-4" role="status">
              <span class="visually-hidden">Loading...</span>
          </div>
          <div class="spinner-border me-4" style="width: 3rem; height: 3rem;" role="status">
              <span class="visually-hidden">Loading...</span>
          </div>
          <div class="spinner-grow" style="width: 3rem; height: 3rem;" role="status">
              <span class="visually-hidden">Loading...</span>
          </div>
      </app-showcode-card>
  </div>
  <div class="col-xl-6">
      <app-showcode-card [title]="'Alignment Margin'" [prism]="prismCodeData.AlignmentMargin"
          >
          <div class="spinner-border m-5" role="status">
              <span class="visually-hidden">Loading...</span>
          </div>
      </app-showcode-card>
  </div>
</div>
<!-- End:: row-4 -->

<!-- Start:: row-5 -->
<div class="row">
  <div class="col-xl-12">
      <app-showcode-card [title]="'Buttons'" [prism]="prismCodeData.Buttons"
          >
          <div class="btn-list">
              <button class="btn btn-primary-light" type="button" disabled>
                  <span class="spinner-border spinner-border-sm align-middle" role="status" aria-hidden="true"></span>
                  <span class="visually-hidden">Loading...</span>
              </button>
              <button class="btn btn-primary-light" type="button" disabled>
                  <span class="spinner-border spinner-border-sm align-middle" role="status" aria-hidden="true"></span>
                  Loading...
              </button>
              <button class="btn btn-primary-light" type="button" disabled>
                  <span class="spinner-grow spinner-grow-sm align-middle" role="status" aria-hidden="true"></span>
                  <span class="visually-hidden">Loading...</span>
              </button>
              <button class="btn btn-primary-light" type="button" disabled>
                  <span class="spinner-grow spinner-grow-sm align-middle" role="status" aria-hidden="true"></span>
                  Loading...
              </button>
              <button class="btn btn-secondary-light" type="button" disabled>
                  <span class="spinner-grow spinner-grow-sm align-middle" role="status" aria-hidden="true"></span>
                  Loading...
              </button>
              <button class="btn btn-success-light" type="button" disabled>
                  <span class="spinner-grow spinner-grow-sm align-middle" role="status" aria-hidden="true"></span>
                  Loading...
              </button>
              <button class="btn btn-info-light" type="button" disabled>
                  <span class="spinner-grow spinner-grow-sm align-middle" role="status" aria-hidden="true"></span>
                  Loading...
              </button>
              <button class="btn btn-warning-light" type="button" disabled>
                  <span class="spinner-grow spinner-grow-sm align-middle" role="status" aria-hidden="true"></span>
                  Loading...
              </button>
              <button class="btn btn-danger-light" type="button" disabled>
                  <span class="spinner-grow spinner-grow-sm align-middle" role="status" aria-hidden="true"></span>
                  Loading...
              </button>
              <button class="btn btn-light" type="button" disabled>
                  <span class="spinner-grow spinner-grow-sm align-middle" role="status" aria-hidden="true"></span>
                  Loading...
              </button>
              <button class="btn btn-dark text-fixed-white" type="button" disabled>
                  <span class="spinner-grow spinner-grow-sm align-middle" role="status" aria-hidden="true"></span>
                  Loading...
              </button>
          </div>
      </app-showcode-card>
  </div>
</div>
<!-- End:: row-5 -->
