<!--ROW-START-->
<div class="row">
  <div class="col-xl-6">
    <app-showcode-card [title]="' Basic example'" [prism]="prismCodeData.Basicexample">
      <div class="btn-group" role="group" aria-label="Basic example">
        <button type="button" class="btn btn-info btn-wave"><i class="bi bi-skip-backward"></i></button>
        <button type="button" class="btn btn-info btn-wave"><i class="bi bi-pause"></i></button>
        <button type="button" class="btn btn-info btn-wave"><i class="bi bi-skip-forward"></i></button>
      </div>
    </app-showcode-card>
  </div>
  <div class="col-xl-6">
    <app-showcode-card [title]="'Navigation'" [prism]="prismCodeData.Navigation">
      <div class="btn-group">
        <a href="javascript:void(0);" class="btn btn-primary active btn-wave" aria-current="page">Active
          link</a>
        <a href="javascript:void(0);" class="btn btn-primary">Link</a>
        <a href="javascript:void(0);" class="btn btn-primary">Link</a>
      </div>
    </app-showcode-card>

  </div>
  <div class="col-xl-6">

    <app-showcode-card [title]="'Mixed style'" [prism]="prismCodeData.Mixedstyle">
      <div class="btn-group" role="group" aria-label="Basic mixed styles example">
        <button type="button" class="btn btn-danger btn-wave">Left</button>
        <button type="button" class="btn btn-warning btn-wave">Middle</button>
        <button type="button" class="btn btn-secondary btn-wave">Right</button>
      </div>
    </app-showcode-card>


  </div>
  <div class="col-xl-6">
    <app-showcode-card [title]="'Outline styled'" [prism]="prismCodeData.Outlinestyled">
      <div class="btn-group" role="group" aria-label="Basic outlined example">
        <button type="button" class="btn btn-outline-primary btn-wave">Left</button>
        <button type="button" class="btn btn-outline-primary btn-wave">Middle</button>
        <button type="button" class="btn btn-outline-primary btn-wave">Right</button>
      </div>

    </app-showcode-card>

  </div>
  <div class="col-xl-6">
    <app-showcode-card [title]="'Checkbox button groups'" classbody="checkbox-button-group"  [prism]="prismCodeData.Checkboxbuttongroups">
      <div class="example">

        <div class="btn-group" role="group" aria-label="Basic checkbox toggle button group">

          <input type="checkbox" class="btn-check" id="btncheck1">
        <label class="btn btn-outline-primary" for="btncheck1">Checkbox 1</label>

        <input type="checkbox" class="btn-check" id="btncheck2">
        <label class="btn btn-outline-primary" for="btncheck2">Checkbox 2</label>

        <input type="checkbox" class="btn-check" id="btncheck3">
        <label class="btn btn-outline-primary" for="btncheck3">Checkbox 3</label>
      </div>
    </div>
    </app-showcode-card>

  </div>
  <div class="col-xl-6">
    <app-showcode-card [title]="'Radio button groups'" [prism]="prismCodeData.Radiobuttongroups">
      <div class="btn-group" role="group" aria-label="Basic radio toggle button group">
        <input type="radio" class="btn-check" name="btnradio" id="btnradio1" checked>
        <label class="btn btn-outline-primary" for="btnradio1">Radio 1</label>

        <input type="radio" class="btn-check" name="btnradio" id="btnradio2">
        <label class="btn btn-outline-primary" for="btnradio2">Radio 2</label>

        <input type="radio" class="btn-check" name="btnradio" id="btnradio3">
        <label class="btn btn-outline-primary" for="btnradio3">Radio 3</label>
      </div>
    </app-showcode-card>

  </div>
  <div class="col-xl-12">
    <app-showcode-card [title]="'Sizing'" [prism]="prismCodeData.Sizing">
      <div class="btn-group btn-group-lg my-1 me-4" role="group" aria-label="Large button group">
        <button type="button" class="btn btn-outline-success">Left</button>
        <button type="button" class="btn btn-outline-success">Middle</button>
        <button type="button" class="btn btn-outline-success">Right</button>
      </div>
      <div class="btn-group my-1 me-4" role="group" aria-label="Default button group">
        <button type="button" class="btn btn-outline-success">Left</button>
        <button type="button" class="btn btn-outline-success">Middle</button>
        <button type="button" class="btn btn-outline-success">Right</button>
      </div>
      <div class="btn-group btn-group-sm my-1 me-4" role="group" aria-label="Small button group">
        <button type="button" class="btn btn-outline-success">Left</button>
        <button type="button" class="btn btn-outline-success">Middle</button>
        <button type="button" class="btn btn-outline-success">Right</button>
      </div>
    </app-showcode-card>

  </div>
  <div class="col-xl-12">
    <app-showcode-card title="Button toolbar" [prism]="prismCodeData.Buttontoolbar">
      <div class="btn-toolbar mb-4" role="toolbar" aria-label="Toolbar with button groups">
        <div class="btn-group me-2 my-1" role="group" aria-label="First group">
          <button type="button" class="btn btn-primary">1</button>
          <button type="button" class="btn btn-primary">2</button>
          <button type="button" class="btn btn-primary">3</button>
          <button type="button" class="btn btn-primary">4</button>
        </div>
        <div class="btn-group me-2 my-1" role="group" aria-label="Second group">
          <button type="button" class="btn btn-secondary">5</button>
          <button type="button" class="btn btn-secondary">6</button>
          <button type="button" class="btn btn-secondary">7</button>
        </div>
        <div class="btn-group my-1" role="group" aria-label="Third group">
          <button type="button" class="btn btn-info">8</button>
        </div>
      </div>
      <div class="btn-toolbar mb-3" role="toolbar" aria-label="Toolbar with button groups">
        <div class="btn-group me-2 my-1" role="group" aria-label="First group">
          <button type="button" class="btn btn-outline-secondary">1</button>
          <button type="button" class="btn btn-outline-secondary">2</button>
          <button type="button" class="btn btn-outline-secondary">3</button>
          <button type="button" class="btn btn-outline-secondary">4</button>
        </div>
        <div class="input-group">
          <div class="input-group-text" id="btnGroupAddon">&#64;</div>
          <input type="text" class="form-control" placeholder="Input group example" aria-label="Input group example"
            aria-describedby="btnGroupAddon">
        </div>
      </div>
      <div class="btn-toolbar justify-content-between d-sm-flex d-block" role="toolbar"
        aria-label="Toolbar with button groups">
        <div class="btn-group my-1" role="group" aria-label="First group">
          <button type="button" class="btn btn-outline-secondary">1</button>
          <button type="button" class="btn btn-outline-secondary">2</button>
          <button type="button" class="btn btn-outline-secondary">3</button>
          <button type="button" class="btn btn-outline-secondary">4</button>
        </div>
        <div class="input-group">
          <div class="input-group-text" id="btnGroupAddon2">&#64;</div>
          <input type="text" class="form-control" placeholder="Input group example" aria-label="Input group example"
            aria-describedby="btnGroupAddon2">
        </div>
      </div>
    </app-showcode-card>

  </div>
  <div class="col-xl-6">
    <app-showcode-card [title]="'Nesting'" [prism]="prismCodeData.Nesting">
      <div class="btn-group" role="group" aria-label="Button group with nested dropdown">
        <button type="button" class="btn btn-primary">1</button>
        <button type="button" class="btn btn-primary">2</button>
        <spk-dropdowns [Customclass]="'btn-group'" [Id]="'btnGroupDrop1'" [class]="'btn-primary dropdown-toggle rounded-start-0'"
          [title]="'Dropdown'" [Menulabel]="'btnGroupDrop1'" [Menuclass]="'dropdown-menu'">

          <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Dropdown link</a></li>
          <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Dropdown link</a></li>

        </spk-dropdowns>

      </div>
    </app-showcode-card>

  </div>
  <div class="col-xl-6">
    <app-showcode-card [title]="'Social Group Buttons'" [prism]="prismCodeData.SocialGroupButtons">
      <div class="btn-group" role="group" aria-label="Basic example">
        <button class="btn btn-icon d-inline-flex align-items-center justify-content-center btn-facebook btn-wave">
          <i class="ri-facebook-line"></i>
        </button>
        <button class="btn btn-icon d-inline-flex align-items-center justify-content-center btn-twitter btn-wave">
          <i class="ri-twitter-x-line"></i>
        </button>
        <button class="btn btn-icon d-inline-flex align-items-center justify-content-center btn-instagram btn-wave">
          <i class="ri-instagram-line"></i>
        </button>
        <button class="btn btn-icon d-inline-flex align-items-center justify-content-center btn-github btn-wave">
          <i class="ri-github-line"></i>
        </button>
        <button class="btn btn-icon d-inline-flex align-items-center justify-content-center btn-youtube btn-wave">
          <i class="ri-youtube-line"></i>
        </button>
        <button class="btn btn-icon d-inline-flex align-items-center justify-content-center btn-google btn-wave">
          <i class="ri-google-line"></i>
        </button>
      </div>
    </app-showcode-card>
  </div>
  <div class="col-xl-12">
    <app-showcode-card [title]="'Vertical variation'" [prism]="prismCodeData.Verticalvariation">
      <div class="row gap-2">
        <div class="col-sm-3">
          <div class="btn-group-vertical" role="group" aria-label="Vertical button group">
            <button type="button" class="btn btn-primary">Button</button>
            <button type="button" class="btn btn-primary">Button</button>
            <spk-dropdowns [Customclass]="'btn-group'" [Id]="'btnGroupVerticalDrop1'"
              [class]="'btn-primary dropdown-toggle rounded-0'" [title]="'Dropdown'" [Menulabel]="'btnGroupVerticalDrop1'"
              [Menuclass]="'dropdown-menu'">

              <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Dropdown link</a></li>
              <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Dropdown link</a></li>

            </spk-dropdowns>

            <button type="button" class="btn btn-primary">Button</button>
            <button type="button" class="btn btn-primary">Button</button>
            <spk-dropdowns [Customclass]="'btn-group'" [Id]="'btnGroupVerticalDrop2'"
              [class]="'btn-primary dropdown-toggle rounded-0'" [title]="'Dropdown'" [Menulabel]="'btnGroupVerticalDrop2'"
              [Menuclass]="'dropdown-menu'">
              <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Dropdown link</a></li>
              <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Dropdown link</a></li>
            </spk-dropdowns>

            <spk-dropdowns [Customclass]="'btn-group'" [Id]="'btnGroupVerticalDrop3'"
              [class]="'btn-primary dropdown-toggle rounded-0'" [title]="'Dropdown'" [Menulabel]="'btnGroupVerticalDrop3'"
              [Menuclass]="'dropdown-menu'">
              <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Dropdown link</a></li>
              <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Dropdown link</a></li>
            </spk-dropdowns>

            <spk-dropdowns [Customclass]="'btn-group'" [Id]="'btnGroupVerticalDrop4'"
              [class]="'btn-primary dropdown-toggle rounded-top-0'" [title]="'Dropdown'" [Menulabel]="'btnGroupVerticalDrop4'"
              [Menuclass]="'dropdown-menu'">
              <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Dropdown link</a></li>
              <li><a ngbDropdownItem class="dropdown-item" href="javascript:void(0);">Dropdown link</a></li>
            </spk-dropdowns>

          </div>
        </div>
        <div class="col-sm-3">
          <div class="btn-group-vertical" role="group" aria-label="Vertical button group">
            <button type="button" class="btn btn-info">Button</button>
            <button type="button" class="btn btn-info">Button</button>
            <button type="button" class="btn btn-info">Button</button>
            <button type="button" class="btn btn-info">Button</button>
            <button type="button" class="btn btn-info">Button</button>
            <button type="button" class="btn btn-info">Button</button>
          </div>
        </div>
        <div class="col-sm-3">
          <div class="btn-group-vertical" role="group" aria-label="Vertical radio toggle button group">
            <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio1" checked="">
            <label class="btn btn-outline-danger mb-0" for="vbtn-radio1">Radio 1</label>
            <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio2">
            <label class="btn btn-outline-danger mb-0" for="vbtn-radio2">Radio 2</label>
            <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio3">
            <label class="btn btn-outline-danger mb-0" for="vbtn-radio3">Radio 3</label>
          </div>
        </div>
      </div>
    </app-showcode-card>
  </div>
</div>
<!--ROW-END-->
