<!-- Start::row-1 -->
<div class="row">
  <div class="col-xl-12">
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Basic Treeview</h3>
      </div>
      <div class="card-body">
        <div id="tree" class="lh-base fw-semibold fs-16">


          <mat-tree #tree [dataSource]="dataSource" [childrenAccessor]="childrenAccessor">
            <!-- Tree node template for leaf nodes -->
            <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
              <button mat-icon-button disabled></button>
              {{ node.name }}
            </mat-tree-node>
            <!-- Tree node template for expandable nodes -->
            <mat-tree-node *matTreeNodeDef="let node; when: hasChild" matTreeNodePadding matTreeNodeToggle
              [cdkTreeNodeTypeaheadLabel]="node.name">
              <button mat-icon-button matTreeNodeToggle [attr.aria-label]="'Toggle ' + node.name">
                <i [class]=" tree.isExpanded(node) ? 'ri-subtract-fill' : 'ri-add-fill' "></i>
              </button>
              {{ node.name }}
            </mat-tree-node>
          </mat-tree>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- End::row-1 -->
