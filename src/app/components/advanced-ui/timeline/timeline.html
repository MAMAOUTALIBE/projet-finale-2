<!-- Row -->
<div class="row">
  <div class="col-lg-12">
    <div class="card custom-card">
      <div class="card-header custom-card-header">
        <h6 class="card-title mb-0">Vertical Timeline</h6>
      </div>
      <div class="card-body">
        <div class="vtimeline">

          @for (item of timelineItems; track item.title) {
          <div class="timeline-wrapper timeline-wrapper-primary" [class.timeline-inverted]="item.inverted">

            <!-- Badge -->
            <div [class]="`timeline-badge ${'success': item.badgeType === 'image'}`">
              @if (item.badgeType === 'image') {
              <img class="timeline-image" [src]="item.badgeValue" alt="img">
              } @else {
              <i [class]="item.badgeValue"></i>
              }
            </div>

            <!-- Panel -->
            <div class="timeline-panel">
              <div class="timeline-heading">
                <h6 class="timeline-title">{{ item.title }}</h6>
              </div>

              <div class="timeline-body">
                <p>{{ item.body }}</p>
                @if(item.image){

                <img [src]="item.image" class="mb-3 br-5" alt="img">
                }
                @if(item.video){
                <div class="embed-responsive embed-responsive-16by9 mb-3 br-5">
                  <iframe class="embed-responsive-item w-100"
                    src="https://www.youtube.com/embed/XZmGGAbHqa0?rel=0&amp;controls=0&amp;showinfo=0"
                    allowfullscreen></iframe>
                </div>
                }
              </div>

              <div class="timeline-footer d-flex align-items-center flex-wrap">
                <i class="fe fe-heart text-muted me-1"></i>
                <span>{{ item.likes }}</span>
                <span class="ms-auto">
                  <i class="fe fe-calendar text-muted me-1 d-inline-flex"></i>{{ item.date }}
                </span>
              </div>
            </div>
          </div>
          }


        </div>
       
      </div>
    </div>
  </div>
</div>
<!-- End Row -->
