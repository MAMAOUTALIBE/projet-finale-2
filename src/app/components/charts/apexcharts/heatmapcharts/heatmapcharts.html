<!-- Start::row-1 -->
<div class="row">
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Basic Heatmap Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="heatmap-basic" [chartOptions]="BasicHeatmapChart" />

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Multi Series Heatmap Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="heatmap-multiseries" [chartOptions]="MultiSeriesHeatmapChart" />
      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Color Range Heatmap Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="heatmap-colorrange" [chartOptions]="ColorRangeHeatmapChart" />
      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Heatmap Range Without Shades</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="heatmap-range" [chartOptions]="HeatmapRangeWithoutShades" />

      </div>
    </div>
  </div>
</div>
<!--End::row-1 -->
