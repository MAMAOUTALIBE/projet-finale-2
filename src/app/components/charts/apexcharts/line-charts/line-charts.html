<!-- Start::row-1 -->
<div class="row">
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Basic Line Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="'line-chart'" [chartOptions]="BasicLineChart"></spk-apexcharts>

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Line Chart With Data Labels</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="'line-chart-datalabels'" [chartOptions]="LineChartWithDataLabels"></spk-apexcharts>
      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Zoomable Time Series</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="'zoom-chart'" [chartOptions]="ZoomableTimeSeries"></spk-apexcharts>

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Line With Annotations</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="'annotation-chart'" [chartOptions]="LineWithAnnotations"></spk-apexcharts>


      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Brush Chart</div>
      </div>
      <div class="card-body">
        <div id="wrapper">
          <spk-apexcharts id="'chart-line1'" [chartOptions]="BrushChart1"></spk-apexcharts>
          <spk-apexcharts id="'chart-line2'" [chartOptions]="BrushChart2"></spk-apexcharts>
        </div>
      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">StepLine Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="'stepline-chart'" [chartOptions]="StepLineChart"></spk-apexcharts>

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Gradient Line Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="'gradient-chart'" [chartOptions]="GradientLineChart"></spk-apexcharts>


      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Missing/Null Values Chart</div>
      </div>
      <div class="card-body">
        <spk-apexcharts id="'null-chart'" [chartOptions]="MissingNullValuesChart"></spk-apexcharts>

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Real Time Chart</div>
      </div>
      <div class="card-body">
        <spk-apexcharts id="'dynamic-chart'" [chartOptions]="RealTimeChart"></spk-apexcharts>

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Dashed Line Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="'dashed-chart'" [chartOptions]="DashedLineChart"></spk-apexcharts>
      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Syncing Charts</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="'chart-line'" [chartOptions]="SyncingCharts1"></spk-apexcharts>
        <spk-apexcharts id="'chart-line2'" [chartOptions]="SyncingCharts2"></spk-apexcharts>
        <spk-apexcharts id="'chart-area'" [chartOptions]="SyncingCharts3"></spk-apexcharts>

      </div>
    </div>
  </div>


</div>
<!--End::row-1 -->
