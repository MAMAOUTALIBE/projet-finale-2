<!-- Start::row-1 -->
<div class="row">
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Basic Boxplot Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="boxplot-basic" [chartOptions]="BasicBoxplotChart" />
      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Boxplot With Scatter Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="boxplot-scatter" [chartOptions]="BoxplotWithScatterChart" />
      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Horizontal Boxplot Chart</div>
      </div>
      <div class="card-body">

            <spk-apexcharts id="boxplot-horizontal"  [chartOptions]="HorizontalBoxplotChart" />

      </div>
    </div>
  </div>
</div>
<!--End::row-1 -->
