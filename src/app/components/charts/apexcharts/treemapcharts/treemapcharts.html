<!-- Start::row-1 -->
<div class="row">
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Basic Treemap Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="treemap-basic" [chartOptions]="BasicTreemapChart" />

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Multi Dimensional Treemap Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="treemap-multi" [chartOptions]="MultiDimensionalTreemapChart" />

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Distributed Treemap Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="treemap-distributed" [chartOptions]="DistributedTreemapChart" />

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Treemap with color ranges</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="treemap-colorranges" [chartOptions]="Treemapwithcolorranges" />

      </div>
    </div>
  </div>
</div>
<!--End::row-1 -->
