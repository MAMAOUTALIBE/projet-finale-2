<!-- Start::row-1 -->
<div class="row">
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Basic Radar Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="radar-basic" [chartOptions]="BasicRadarChart" />

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Radar Chart-Multiple Series</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="radar-multiple" [chartOptions]="RadarChartMultipleSeries" />

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Radar Chart Polygon Fill</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="radar-polygon" [chartOptions]="RadarChartPoygonFill" />

      </div>
    </div>
  </div>
</div>
<!--End::row-1 -->
