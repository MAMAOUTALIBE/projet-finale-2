
<!-- Start::row-1 -->
<div class="row">
    <div class="col-xl-6">
      <div class="card custom-card">
        <div class="card-header">
          <div class="card-title">Basic Pie Chart</div>
        </div>
        <div class="card-body">

            <spk-apexcharts id="radialbar-basic" [chartOptions]="BasicRadialbarChart" />

        </div>
      </div>
    </div>
    <div class="col-xl-6">
      <div class="card custom-card">
        <div class="card-header">
          <div class="card-title">Multiple Radialbar Chart</div>
        </div>
        <div class="card-body">

            <spk-apexcharts id="radialbar-multiple" [chartOptions]="MultipleRadialBarChart" />

        </div>
      </div>
    </div>
    <div class="col-xl-6">
      <div class="card custom-card">
        <div class="card-header">
          <div class="card-title">Circle Chart - Custom Angle</div>
        </div>
        <div class="card-body">
          <spk-apexcharts id="circle-custom" [chartOptions]="CircleChartCustomAngle" />
        </div>
      </div>
    </div>
    <div class="col-xl-6">
      <div class="card custom-card">
        <div class="card-header">
          <div class="card-title">Gradient Circle Chart</div>
        </div>
        <div class="card-body">

            <spk-apexcharts id="gradient-circle" [chartOptions]="GradientCircleChart" />

        </div>
      </div>
    </div>
    <div class="col-xl-6">
      <div class="card custom-card">
        <div class="card-header">
          <div class="card-title">Stroked Circular Gauge</div>
        </div>
        <div class="card-body">
          <div >
            <spk-apexcharts id="circular-stroked" [chartOptions]="StrokedCircularGauge" />
          </div>
        </div>
      </div>
    </div>
    <div class="col-xl-6">
      <div class="card custom-card">
        <div class="card-header">
          <div class="card-title">Circle Chart With Image</div>
        </div>
        <div class="card-body">
            <spk-apexcharts id="circle-image" [chartOptions]="CircleWithImage" />

        </div>
      </div>
    </div>
    <div class="col-xl-6">
      <div class="card custom-card">
        <div class="card-header">
          <div class="card-title">Semi Circular Gauge</div>
        </div>
        <div class="card-body">
            <spk-apexcharts id="circular-semi" [chartOptions]="SemiCircularGauge" />

        </div>
      </div>
    </div>
  </div>
  <!--End::row-1 -->
