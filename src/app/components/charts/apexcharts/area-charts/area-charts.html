<!-- Start::row-1 -->
<div class="row">
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Basic Area Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="area-basic" [chartOptions]="BasicAreaChart"></spk-apexcharts>

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Spline Area Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="area-spline" [chartOptions]="SplineAreaChart"></spk-apexcharts>

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Area Chart With Negative Values</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="area-negative" [chartOptions]="AreaChartWithNegativeValues"></spk-apexcharts>

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Selection-Github Style Chart</div>
      </div>
      <div class="card-body">
        <spk-apexcharts id="chart-months" [chartOptions]="SelectionGithubStyleChart1"></spk-apexcharts>
        <div class="github-style d-flex align-items-center">
          <div class="me-2">
            <img class="userimg rounded" src="./assets/images/faces/1.jpg" data-hovercard-user-id="634573" alt=""
              width="38" height="38">
          </div>
          <div class="userdetails lh-1">
            <a class="username fw-medium fs-14">coder</a>
            <span class="cmeta d-block mt-1">
              <span class="commits">95</span> commits
            </span>
          </div>
        </div>
        <spk-apexcharts id="chart-years" [chartOptions]="SelectionGithubStyleChart2"></spk-apexcharts>

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Stacked Area Chart</div>
      </div>
      <div class="card-body">
        <spk-apexcharts id="area-stacked" [chartOptions]="StackedAreaChart"></spk-apexcharts>


      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Irregular Time Series Chart</div>
      </div>
      <div class="card-body">
        <spk-apexcharts id="area-irregular" [chartOptions]="irregularTimeseries"></spk-apexcharts>


      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Area Chart With Null Values</div>
      </div>
      <div class="card-body">
        <spk-apexcharts id="area-null" [chartOptions]="AreaChartWithNullValues"></spk-apexcharts>

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header d-flex">
        <div class="card-title">Area Chart-Datetime X-Axis Chart</div>
        <div class="btn-group ms-auto">
          <button class="btn btn-primary btn-sm" id="one_month" (click)="updateData( '1m' )"
            [class.active]="activeOptionButton=='1m'">1M</button>
          <button class="btn btn-primary btn-sm" id="six_months" (click)="updateData( '6m' )"
            [class.active]="activeOptionButton=='6m'">6M</button>
          <button class="btn btn-primary btn-sm" id="one_year" (click)="updateData( '1y' )"
            [class.active]="activeOptionButton=='1y'">1Y</button>
          <button class="btn btn-primary btn-sm" id="all" (click)="updateData( 'all' )"
            [class.active]="activeOptionButton=='all'">ALL</button>


        </div>
      </div>
      <div class="card-body">
        <div id="area-datetime" class="chart-container8">
          <spk-apexcharts id="area-datetime" [chartOptions]="AreaChartDatetimeXAxisChart"></spk-apexcharts>
        </div>
      </div>
    </div>
  </div>
</div>
<!--End::row-1 -->
