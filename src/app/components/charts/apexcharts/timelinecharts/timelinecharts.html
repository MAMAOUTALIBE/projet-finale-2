<!-- Start::row-1 -->
<div class="row">
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Basic TImeline Chart</div>
      </div>
      <div class="card-body">
        <spk-apexcharts id="timeline-basic" [chartOptions]="BasicTImelineChart" />
      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Multiple Colored TImeline Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="timeline-colors" [chartOptions]="MultipleColoredTImelineChart" />

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Multi Series Timeline Chart</div>
      </div>
      <div class="card-body">

            <spk-apexcharts id="timeline-multi" [chartOptions]="MultiSeriesTimelineChart" />

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Advanced Timeline Chart</div>
      </div>
      <div class="card-body">

            <spk-apexcharts id="timeline-advanced" [chartOptions]="AdvancedTimelineChart" />

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Timeline-Grouped Rows</div>
      </div>
      <div class="card-body">

            <spk-apexcharts  id="timeline-grouped" [chartOptions]="TimelineGroupedRows" />

      </div>
    </div>
  </div>
</div>
<!--End::row-1 -->
