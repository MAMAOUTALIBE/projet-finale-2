<!-- Start::row-1 -->
<div class="row">
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Basic Scatter Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="scatter-basic" [chartOptions]="BasicScatterChart" />

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Datetime Scatter Chart</div>
      </div>
      <div class="card-body">

        <spk-apexcharts id="scatter-datetime" [chartOptions]="DatetimeScatterChart" />

      </div>
    </div>
  </div>
  <div class="col-xl-6">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Image Fill Scatter Chart</div>
      </div>
      <div class="card-body">

            <spk-apexcharts id="scatter-image" [chartOptions]="ImageFillScatterChart" />

      </div>
    </div>
  </div>
</div>
<!--End::row-1 -->
